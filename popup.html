<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Bricks Infused</title>
  <style>
    body {
      width: 200px;
      padding: 16px;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fa;
    }
    
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
    }
    
    .title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin: 0;
    }
    
    .subtitle {
      font-size: 12px;
      color: #666;
      margin: 4px 0 0 0;
    }
    
    .button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 8px;
    }
    
    .button:hover {
      background: #0056b3;
    }
    
    .button:active {
      background: #004085;
    }
    
  </style>
</head>
<body>
  <div class="header">
    <img src="bricks-infused.svg" alt="Bricks Infused" class="logo">
    <h1 class="title">Bricks Infused</h1>
    <p class="subtitle" id="version-text"></p>
  </div>
  
  <button class="button" id="startBricks">
    <img src="bricks.svg" alt="Bricks Infused" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 2px;"> Start Bricks
  </button>
  
  <button class="button" id="openOptions">
    ⚙️ Instellingen
  </button>
  
  
  <script src="popup.js"></script>
</body>
</html>
